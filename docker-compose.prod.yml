services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dashboard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: dashboard
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    environment:
      DEBUG: "false"
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY}
      DATASOURCE_ENCRYPTION_KEY: ${DATASOURCE_ENCRYPTION_KEY:?set DATASOURCE_ENCRYPTION_KEY}
      SQL_ALLOWED_HOSTS: ${SQL_ALLOWED_HOSTS:-db}
      SQL_QUERY_TIMEOUT_SECONDS: "${SQL_QUERY_TIMEOUT_SECONDS:-10}"
      SQL_MAX_ROWS: "${SQL_MAX_ROWS:-1000}"
      SQLITE_DATA_DIR: ${SQLITE_DATA_DIR:-./data}
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
